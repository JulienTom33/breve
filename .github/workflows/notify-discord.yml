name: Notify Discord on main

on:
  push:
    branches:
      - main
    # Pour notifier aussi les tags de release, tu peux ajouter :
    # tags:
    #   - 'v*'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "embeds": [{
                   "title": "Nouveau push sur breve",
                   "description": "User: ${{ github.actor }}\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref }}\nMessage: ${{ github.event.head_commit.message }}",
                   "color": 5814783
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}