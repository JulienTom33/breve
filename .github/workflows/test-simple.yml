name: 🤖 Test Workflow Simple

on:
  workflow_dispatch:
    inputs:
      ticket_number:
        description: 'Numéro du ticket'
        required: true
        type: string
      ticket_title:
        description: 'Titre du ticket'
        required: true
        type: string
      ticket_description:
        description: 'Description'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🔔 Test Start
        run: |
          echo "✅ Workflow démarré!"
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "🚀 Test démarré",
                "description": "Ticket: ${{ github.event.inputs.ticket_number }}",
                "color": 3447003
              }]
            }' || echo "Discord notification sent"

      - name: ✅ Test Complete
        run: |
          echo "✅ Workflow complété!"
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ Test complété",
                "description": "Ticket: ${{ github.event.inputs.ticket_number }}",
                "color": 3066993
              }]
            }' || echo "Discord notification sent"
