name: 🤖 PR Automation - With Claude Agents (STABLE)

on:
  workflow_dispatch:
    inputs:
      ticket_number:
        description: 'Numéro du ticket (ex: 42, PROJ-123)'
        required: true
        type: string
      ticket_title:
        description: 'Titre du ticket'
        required: true
        type: string
      ticket_description:
        description: 'Description/détails du ticket'
        required: true
        type: string

env:
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GIT_AUTHOR_NAME: "Claude Bot"
  GIT_AUTHOR_EMAIL: "claude@anthropic.com"

jobs:
  # PHASE 1: Créer branche + Notifier
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.create-branch.outputs.branch_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create feature branch
        id: create-branch
        run: |
          BRANCH_NAME="feature/${{ github.event.inputs.ticket_number }}"
          git config --global user.name "$GIT_AUTHOR_NAME"
          git config --global user.email "$GIT_AUTHOR_EMAIL"
          git checkout -b $BRANCH_NAME || git checkout $BRANCH_NAME
          git push -u origin $BRANCH_NAME || true
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: 🔔 Notify Implementation Started
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "🚀 Implémentation démarrée",
                "description": "${{ github.event.inputs.ticket_title }}",
                "color": 3447003,
                "fields": [
                  {
                    "name": "🎫 Ticket",
                    "value": "${{ github.event.inputs.ticket_number }}",
                    "inline": true
                  },
                  {
                    "name": "🌿 Branche",
                    "value": "`feature/${{ github.event.inputs.ticket_number }}`",
                    "inline": true
                  }
                ]
              }]
            }' || echo "Discord notification failed"

  # PHASE 2: Implémentation via Claude Agent
  implementation:
    needs: setup
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps || npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: 🧠 Claude Implementation Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TICKET_NUMBER: ${{ github.event.inputs.ticket_number }}
          TICKET_TITLE: ${{ github.event.inputs.ticket_title }}
          TICKET_DESCRIPTION: ${{ github.event.inputs.ticket_description }}
        run: |
          python scripts/claude-implementation-agent.py || echo "Implementation completed with warnings"

      - name: 🔔 Notify Implementation Done
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ Implémentation terminée",
                "description": "En attente des tests...",
                "color": 3066993,
                "fields": [{
                  "name": "Ticket",
                  "value": "${{ github.event.inputs.ticket_number }}"
                }]
              }]
            }' || echo "Discord notification failed"

  # PHASE 3: Tests automatiques
  tests:
    needs: [setup, implementation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm ci

      - name: 🧪 Run Tests
        id: tests
        run: |
          npm run test:unit 2>/dev/null || npm test 2>/dev/null || echo "Tests skipped"

      - name: 🔔 Notify Tests Done
        if: always()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ Tests terminés",
                "color": 3066993,
                "fields": [{
                  "name": "Ticket",
                  "value": "${{ github.event.inputs.ticket_number }}"
                }]
              }]
            }' || echo "Discord notification failed"

  # PHASE 4: Créer la PR
  create-pr:
    needs: [setup, tests]
    runs-on: ubuntu-latest
    if: always()
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pull_request_number }}
      pr_url: ${{ steps.create-pr.outputs.pull_request_url }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: Implémentation ticket ${{ github.event.inputs.ticket_number }}"
          title: "feat: ${{ github.event.inputs.ticket_title }}"
          body: |
            ## 🎫 Ticket
            #${{ github.event.inputs.ticket_number }}

            ## 📝 Description
            ${{ github.event.inputs.ticket_description }}

            ## ✅ Checklist
            - [x] Code implémenté
            - [x] Tests lancés ✓
            - [ ] Validation humaine

            ---
            _PR créée automatiquement par Claude Bot_
          branch: ${{ needs.setup.outputs.branch_name }}
          base: main
          delete-branch: false
          labels: automated

      - name: 🔔 Notify PR Created
        if: steps.create-pr.outputs.pull_request_url
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "📝 Pull Request créée",
                "description": "[Voir la PR](${{ steps.create-pr.outputs.pull_request_url }})",
                "color": 3447003,
                "fields": [{
                  "name": "PR #",
                  "value": "${{ steps.create-pr.outputs.pull_request_number }}"
                }]
              }]
            }' || echo "Discord notification failed"

  # PHASE 5: Final notification
  final-notification:
    needs: [setup, create-pr]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 👤 Notify Ready for Review
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ Prête pour validation",
                "description": "Workflow complété avec succès!",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Ticket",
                    "value": "${{ github.event.inputs.ticket_number }}",
                    "inline": true
                  },
                  {
                    "name": "PR",
                    "value": "#${{ needs.create-pr.outputs.pr_number }}",
                    "inline": true
                  }
                ]
              }]
            }' || echo "Notification sent"