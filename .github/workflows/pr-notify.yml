name: PR Discord Notifications

on:
  pull_request:
    types: [opened, ready_for_review, closed, reopened]

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    steps:
      - name: PR Ouverte
        if: github.event.action == 'opened' && github.event.pull_request.draft == false
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: info
          details: |
            **Auteur:** ${{ github.event.pull_request.user.login }}
            **Branche:** `${{ github.head_ref }}` → `main`
            **Commits:** ${{ github.event.pull_request.commits }}
            **Fichiers modifiés:** ${{ github.event.pull_request.changed_files }}
            **Lien:** ${{ github.event.pull_request.html_url }}
          text: "🚀 **Nouvelle PR** — `${{ github.event.pull_request.title }}`"

      - name: PR Draft Ouverte
        if: github.event.action == 'opened' && github.event.pull_request.draft == true
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: info
          details: |
            **Branche:** `${{ github.head_ref }}`
            **Lien:** ${{ github.event.pull_request.html_url }}
          text: "🛠️ **Draft PR créée** — `${{ github.event.pull_request.title }}`"

      - name: PR Prête pour Review
        if: github.event.action == 'ready_for_review'
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: good
          details: |
            **PR #${{ github.event.pull_request.number }}:** ${{ github.event.pull_request.title }}
            **→ Valider ici :** ${{ github.event.pull_request.html_url }}
          text: "✅ **PR soumise pour validation** — en attente de ta review"

      - name: PR Mergée
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: good
          details: |
            **PR #${{ github.event.pull_request.number }}:** ${{ github.event.pull_request.title }}
            **Mergé par:** ${{ github.event.pull_request.merged_by.login }}
          text: "🎉 **PR mergée dans main** — `${{ github.event.pull_request.title }}`"

      - name: PR Fermée sans Merge
        if: github.event.action == 'closed' && github.event.pull_request.merged == false
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: warn
          details: |
            **PR #${{ github.event.pull_request.number }}:** ${{ github.event.pull_request.title }}
            **Lien:** ${{ github.event.pull_request.html_url }}
          text: "🚫 **PR fermée sans merge** — `${{ github.event.pull_request.title }}`"
