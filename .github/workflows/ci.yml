name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' # adapte à ton projet

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Notify Discord success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        uses: Ilshidur/action-discord@master
        with:
          args: "✅ CI OK pour ${{ github.repository }} @ ${{ github.ref }}"

      - name: Notify Discord failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        uses: Ilshidur/action-discord@master
        with:
          args: "❌ CI FAIL pour ${{ github.repository }} @ ${{ github.ref }}. Vérifier les logs GitHub Actions."