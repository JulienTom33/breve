name: 🔧 Auto Notify PR Fix

on:
  push:
    branches:
      - 'feature/**'

jobs:
  notify-fix:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR Number from Branch
        id: pr-info
        run: |
          BRANCH=${{ github.ref_name }}
          # Extract number from feature/93-button-component -> 93
          PR_NUMBER=$(echo "$BRANCH" | sed 's/feature\/\([0-9]*\).*/\1/')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "PR Number detected: $PR_NUMBER"

      - name: 🔔 Notify Discord
        if: steps.pr-info.outputs.pr_number != ''
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ PR #${{ steps.pr-info.outputs.pr_number }} Corrigée",
                "description": "Corrections appliquées et pushées!",
                "color": 3066993,
                "fields": [{
                  "name": "Branche",
                  "value": "${{ steps.pr-info.outputs.branch }}"
                }]
              }]
            }' 2>/dev/null || echo "Discord notification sent"
