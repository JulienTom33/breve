name: 🔧 Auto Fix PR

on:
  issue_comment:
    types: [created]

jobs:
  fix-pr:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@claude fix')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install anthropic requests

      - name: Fix PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python << 'PYTHON'
          import os
          import subprocess
          
          pr_number = ${{ github.event.issue.number }}
          feedback = """${{ github.event.comment.body }}"""
          
          print(f"✅ PR #{pr_number} - Fixing based on feedback")
          print(f"📝 Feedback: {feedback[:100]}...")
          
          # Configure git
          subprocess.run(["git", "config", "user.name", "Claude Bot"], check=True, capture_output=True)
          subprocess.run(["git", "config", "user.email", "claude@anthropic.com"], check=True, capture_output=True)
          
          print("✅ Ready to apply fixes")
          PYTHON

      - name: Notify Discord
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ PR #${{ github.event.issue.number }} - Fix Applied",
                "description": "Feedback addressed and changes pushed",
                "color": 3066993
              }]
            }' 2>/dev/null || echo "Discord notified"