name: 🔧 Auto Fix PR

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Numéro de la PR à corriger'
        required: true
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  GITHUB_REPOSITORY: ${{ github.repository }}

jobs:
  fix-pr:
    # Ne déclencher que si:
    # 1. C'est un PR (pas une issue)
    # 2. Le commentaire contient "@claude fix" ou "fix-pr"
    if: |
      github.event.issue.pull_request != null &&
      (contains(github.event.comment.body, '@claude fix') || 
       contains(github.event.comment.body, 'fix-pr') ||
       github.event_name == 'workflow_dispatch')
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: 🔍 Analyze PR and Fix
        env:
          PR_NUMBER: ${{ github.event.issue.number || github.event.inputs.pr_number }}
        run: |
          python scripts/fix-pr-skill.py $PR_NUMBER

      - name: ✅ Notify Discord - Fixed
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "✅ PR Corrigée",
                "description": "Les corrections ont été appliquées et pushées!",
                "color": 3066993,
                "fields": [{
                  "name": "PR",
                  "value": "#${{ github.event.issue.number || github.event.inputs.pr_number }}"
                }]
              }]
            }' || echo "Discord notification sent"

      - name: ❌ Notify Discord - Error
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "embeds": [{
                "title": "❌ Erreur lors de la correction",
                "description": "Voir les logs pour plus de détails",
                "color": 15158332,
                "fields": [{
                  "name": "PR",
                  "value": "#${{ github.event.issue.number || github.event.inputs.pr_number }}"
                }]
              }]
            }' || echo "Discord notification sent"
