name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Notify Discord — Lint Failed
        if: failure()
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: error
          details: |
            **Repo:** ${{ github.repository }}
            **Branche:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
            **Logs:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          text: "❌ **Lint / TypeCheck échoué** sur `${{ github.event.pull_request.title }}`"

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Notify Discord — Tests Failed
        if: failure()
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: error
          details: |
            **Repo:** ${{ github.repository }}
            **Branche:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
            **Logs:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          text: "❌ **Tests unitaires échoués** sur `${{ github.event.pull_request.title }}`"

      - name: Notify Discord — Tests Passed
        if: success()
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: info
          details: |
            **Repo:** ${{ github.repository }}
            **Branche:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
          text: "✅ **Tests unitaires OK** sur `${{ github.event.pull_request.title }}`"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Notify Discord — Build Failed
        if: failure()
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: error
          details: |
            **Repo:** ${{ github.repository }}
            **Branche:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
            **Logs:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          text: "❌ **Build échoué** sur `${{ github.event.pull_request.title }}`"

      - name: Notify Discord — Build OK
        if: success()
        uses: rjstone/discord-webhook-notify@v1
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: info
          details: |
            **Repo:** ${{ github.repository }}
            **Branche:** `${{ github.head_ref }}`
            **PR:** ${{ github.event.pull_request.html_url }}
          text: "🏗️ **Build OK** — PR prête pour la review Claude"
